<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAGnetic — Dashboard</title>
    <meta name="description" content="RAGnetic Dashboard — Create, deploy, and manage your AI agents." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/dashboard.css') }}">
    <script>
        // Auth guard — redirect to login if no token
        const API_BASE_URL = window.location.origin + '/api/v1';
        if (!localStorage.getItem('ragnetic_user_token')) {
            window.location.href = '/login';
        }
    </script>
    <script src="{{ url_for('static', path='js/dashboard.js') }}" defer></script>
</head>
<body class="dashboard-body">

    <!-- Sidebar -->
    <aside class="dashboard-sidebar">
        <nav class="sidebar-nav">
            <a class="sidebar-nav-item active" href="/dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                Agents
            </a>
            <a class="sidebar-nav-item" href="/">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                Chat
            </a>
        </nav>

        <div class="sidebar-footer">
            <button id="logout-btn" class="logout-btn" onclick="handleLogout()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16,17 21,12 16,7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-main">
        <div class="dashboard-header">
            <h1>Your Agents <span class="agent-count" id="agent-count"></span></h1>
            <button class="btn-create-agent" onclick="openCreateModal()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Create Agent
            </button>
        </div>

        <div id="agents-container">
            <div class="agents-loading">
                <div class="spinner"></div>
                Loading agents…
            </div>
        </div>
    </main>

    <!-- Create Agent Modal -->
    <div class="modal-overlay" id="create-modal">
        <div class="modal-container">
            <div class="modal-header">
                <h2>Create New Agent</h2>
                <button class="modal-close-btn" onclick="closeCreateModal()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <form id="create-agent-form" onsubmit="handleCreateAgent(event)">
                <div class="modal-body">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="agent-name">Agent Name *</label>
                            <input type="text" id="agent-name" placeholder="my_agent" required
                                   pattern="[a-zA-Z0-9_-]{3,50}"
                                   title="3-50 characters: letters, numbers, underscores, hyphens" />
                            <span class="form-hint">3-50 chars: letters, numbers, _, -</span>
                        </div>
                        <div class="form-group">
                            <label for="agent-display-name">Display Name</label>
                            <input type="text" id="agent-display-name" placeholder="My Assistant" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="agent-description">Description</label>
                        <input type="text" id="agent-description" placeholder="A brief description of what this agent does" />
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="agent-model">LLM Model</label>
                            <select id="agent-model">
                                <option value="gpt-4o-mini" selected>GPT-4o Mini</option>
                                <option value="gpt-4o">GPT-4o</option>
                                <option value="gpt-4.1-mini">GPT-4.1 Mini</option>
                                <option value="gpt-4.1">GPT-4.1</option>
                                <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
                                <option value="claude-3-5-sonnet-20241022">Claude 3.5 Sonnet</option>
                                <option value="claude-3-5-haiku-20241022">Claude 3.5 Haiku</option>
                                <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                                <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="agent-embedding">Embedding Model</label>
                            <select id="agent-embedding">
                                <option value="text-embedding-3-small" selected>text-embedding-3-small</option>
                                <option value="text-embedding-3-large">text-embedding-3-large</option>
                                <option value="text-embedding-ada-002">text-embedding-ada-002</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="agent-persona">Persona Prompt</label>
                        <textarea id="agent-persona" placeholder="You are a helpful assistant that specializes in…"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Data Sources <span class="form-hint">(optional)</span></label>
                        <div class="sources-list" id="sources-list"></div>
                        <button type="button" class="btn-add-source" onclick="addSourceEntry()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            Add Source
                        </button>
                    </div>

                    <div class="form-group">
                        <label>Tools <span class="form-hint">(optional)</span></label>
                        <div class="form-row">
                            <label style="display:flex;align-items:center;gap:0.5rem;font-weight:400;color:var(--muted-text);font-size:var(--font-size-sm)">
                                <input type="checkbox" id="tool-retriever" value="retriever"> Document Retriever
                            </label>
                            <label style="display:flex;align-items:center;gap:0.5rem;font-weight:400;color:var(--muted-text);font-size:var(--font-size-sm)">
                                <input type="checkbox" id="tool-web-search" value="web_search"> Web Search
                            </label>
                            <label style="display:flex;align-items:center;gap:0.5rem;font-weight:400;color:var(--muted-text);font-size:var(--font-size-sm)">
                                <input type="checkbox" id="tool-code-exec" value="code_execution"> Code Execution
                            </label>
                            <label style="display:flex;align-items:center;gap:0.5rem;font-weight:400;color:var(--muted-text);font-size:var(--font-size-sm)">
                                <input type="checkbox" id="tool-sql" value="sql_toolkit"> SQL Toolkit
                            </label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-modal-cancel" onclick="closeCreateModal()">Cancel</button>
                    <button type="submit" class="btn-modal-submit" id="create-submit-btn">Create Agent</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Confirm Dialog -->
    <div class="confirm-overlay" id="confirm-dialog">
        <div class="confirm-box">
            <p id="confirm-text">Are you sure?</p>
            <div class="confirm-actions">
                <button class="btn-modal-cancel" onclick="closeConfirmDialog()">Cancel</button>
                <button class="card-action-btn delete" id="confirm-action-btn" onclick="executeConfirmedAction()">Delete</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="dashboard-toast" id="dashboard-toast"></div>

</body>
</html>
